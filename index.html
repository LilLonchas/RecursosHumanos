<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RRHH | Transportes Belzunces</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .sidebar-card { transition: all 0.3s ease; border-left: 4px solid transparent; cursor: pointer; }
        .sidebar-card.active-tab { border-left: 4px solid #2563eb; background: #eff6ff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full space-y-6 text-center">
            <h2 class="text-2xl font-bold text-slate-900 uppercase italic">Belzunces</h2>
            <input type="password" id="passInput" placeholder="Contraseña" class="w-full p-4 bg-slate-100 border rounded-xl outline-none text-center font-bold">
            <button onclick="validarAcceso()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase text-xs tracking-widest shadow-lg">Entrar</button>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        <header class="bg-slate-900 text-white p-6 shadow-xl flex justify-between items-center">
            <h1 class="text-2xl font-bold uppercase italic text-blue-400">Transportes Belzunces</h1>
            <button onclick="cerrarSesion()" class="text-xs bg-slate-800 px-4 py-2 rounded-lg text-slate-300">Salir</button>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 md:grid-cols-4 gap-8">
            <aside class="space-y-2">
                <button onclick="showTab('inicio', this)" class="w-full text-left p-4 rounded-lg bg-white shadow-sm sidebar-card active-tab">📊 Totales por Empleado</button>
                <button onclick="showTab('vacaciones', this)" class="w-full text-left p-4 rounded-lg bg-white shadow-sm sidebar-card">📅 Nueva Solicitud</button>
            </aside>

            <section class="md:col-span-3">
                <div id="inicio" class="tab-content active bg-white p-6 rounded-2xl shadow-sm border">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-slate-900">Resumen Anual de Vacaciones</h2>
                        <button onclick="cargarDatosExcel()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 transition">🔄 Recalcular Totales</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="border-b text-slate-400 uppercase text-[10px] font-extrabold tracking-widest">
                                    <th class="py-4 px-2">Empleado</th>
                                    <th class="py-4 px-2">Empresa</th>
                                    <th class="py-4 px-2">Últimos Periodos</th>
                                    <th class="py-4 px-2 text-center">Días Totales</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-datos"></tbody>
                        </table>
                    </div>
                </div>

                <div id="vacaciones" class="tab-content bg-white p-8 rounded-2xl shadow-sm border">
                    <div class="max-w-md mx-auto space-y-4">
                        <h2 class="text-xl font-bold text-center text-blue-900 uppercase">Nueva Solicitud</h2>
                        <select id="empresa" class="w-full p-3 bg-slate-50 border rounded-lg text-sm font-semibold">
                            <option>Transportes Antonio Belzunces S.L</option>
                            <option>Transportes Juan Belzunces S.L</option>
                            <option>Comercial Belzunces Rojas S.A</option>
                        </select>
                        <input type="text" id="nombre" placeholder="Nombre completo" class="w-full p-3 bg-slate-50 border rounded-lg text-sm">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="date" id="fechaIni" onchange="calcularDias()" class="p-3 bg-slate-50 border rounded-lg text-sm">
                            <input type="date" id="fechaFin" onchange="calcularDias()" class="p-3 bg-slate-50 border rounded-lg text-sm">
                        </div>
                        <div class="bg-blue-50 p-4 rounded-xl flex justify-between items-center font-bold">
                            <span class="text-blue-700">Días Solicitados:</span>
                            <span id="contadorDias" class="text-blue-900 text-xl">0</span>
                        </div>
                        <button onclick="enviarYDescargar()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase shadow-lg">Guardar y Descargar</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyGNuHnVWPRttyk3zMsnvX4DKPngqSNBQttrS3mafWJ8C8RtNr506WkeSimu5VPegt-eg/exec";
        const SHEET_ID = "1u8I2q-Hz6COb6m0e9eeR5S_lOiGAIErHXEV_v3YxtGA";

        function validarAcceso() {
            if (document.getElementById('passInput').value === "belzunces2026") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                sessionStorage.setItem('auth_belzunces', 'true');
                cargarDatosExcel();
            }
        }

        window.onload = () => { if (sessionStorage.getItem('auth_belzunces') === 'true') { validarAcceso(); } };
        function cerrarSesion() { sessionStorage.removeItem('auth_belzunces'); location.reload(); }
        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar-card').forEach(c => c.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active-tab');
        }

        function calcularDias() {
            const f1 = document.getElementById('fechaIni').value;
            const f2 = document.getElementById('fechaFin').value;
            if (f1 && f2) {
                const diff = (new Date(f2) - new Date(f1)) / (1000 * 60 * 60 * 24) + 1;
                document.getElementById('contadorDias').innerText = diff > 0 ? Math.round(diff) : 0;
            }
        }

        async function cargarDatosExcel() {
            const tbody = document.getElementById('tabla-datos');
            tbody.innerHTML = "<tr><td colspan='4' class='py-8 text-center italic'>Calculando acumulados...</td></tr>";
            
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&id=${SHEET_ID}&gid=0&t=${Date.now()}`;
            
            try {
                const res = await fetch(url);
                const csvText = await res.text();
                const filas = csvText.split('\n').map(row => row.split(','));

                const trabajadores = {};

                // Procesar datos y acumular
                for (let i = 1; i < filas.length; i++) {
                    const r = filas[i];
                    if (r.length < 4 || !r[3]) continue;

                    const limpiar = (t) => t ? t.replace(/"/g, '').trim() : '';
                    const empresa = limpiar(r[1]);
                    const nombre = limpiar(r[3]);
                    const periodo = `${limpiar(r[4])} al ${limpiar(r[5])}`;
                    const dias = parseInt(limpiar(r[6])) || 0;

                    // Creamos una clave única por Nombre + Empresa
                    const clave = `${nombre}-${empresa}`;

                    if (!trabajadores[clave]) {
                        trabajadores[clave] = {
                            nombre: nombre,
                            empresa: empresa,
                            periodos: [periodo],
                            totalDias: dias
                        };
                    } else {
                        trabajadores[clave].totalDias += dias;
                        // Guardamos solo los últimos 2 periodos para no colapsar la tabla
                        if (trabajadores[clave].periodos.length < 2) {
                            trabajadores[clave].periodos.push(periodo);
                        }
                    }
                }

                tbody.innerHTML = "";
                
                // Dibujar la tabla con los datos acumulados
                Object.values(trabajadores).forEach(t => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b hover:bg-slate-50 transition";
                    tr.innerHTML = `
                        <td class="py-4 px-2 font-bold text-slate-900">${t.nombre}</td>
                        <td class="py-4 px-2">
                            <p class="text-[10px] text-slate-400 uppercase font-black">${t.empresa}</p>
                            <p class="text-blue-600 text-[10px] font-bold">CONDUCTOR</p>
                        </td>
                        <td class="py-4 px-2 text-[10px] text-slate-500 italic">
                            ${t.periodos.join('<br>')}
                            ${t.periodos.length > 1 ? '...' : ''}
                        </td>
                        <td class="py-4 px-2 text-center">
                            <span class="inline-block bg-blue-600 text-white font-black px-3 py-1 rounded-full text-sm shadow-sm">
                                ${t.totalDias}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (e) {
                tbody.innerHTML = "<tr><td colspan='4' class='py-8 text-center text-red-500'>Error al calcular.</td></tr>";
            }
        }

        async function enviarYDescargar() {
            const d = {
                empresa: document.getElementById('empresa').value,
                puesto: "CONDUCTOR",
                nombre: document.getElementById('nombre').value,
                inicio: document.getElementById('fechaIni').value,
                fin: document.getElementById('fechaFin').value,
                dias: document.getElementById('contadorDias').innerText
            };
            if (!d.nombre || d.dias == "0") return alert("Rellena todo.");

            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });

            const doc = new docx.Document({
                sections: [{
                    children: [
                        new docx.Paragraph({ children: [new docx.TextRun({ text: d.empresa.toUpperCase(), bold: true, size: 28, color: "1e40af" })] }),
                        new docx.Paragraph({ text: `VACACIONES: ${d.nombre.toUpperCase()}`, spacing: { before: 400 } }),
                        new docx.Paragraph({ text: `Días: ${d.dias}`, spacing: { before: 200 } }),
                        new docx.Paragraph({ text: "\n\nFirma: __________________________", spacing: { before: 800 } })
                    ]
                }]
            });

            docx.Packer.toBlob(doc).then(blob => {
                saveAs(blob, `Solicitud_${d.nombre}.docx`);
                alert("Guardado. Recalculando totales...");
                setTimeout(cargarDatosExcel, 3000);
            });
        }
    </script>
</body>
</html>
