<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RRHH | Transportes Belzunces</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; overflow: hidden; }
        .sidebar-card { transition: all 0.3s ease; border-left: 4px solid transparent; cursor: pointer; background: #1e293b; }
        .sidebar-card.active-tab { border-left: 4px solid #3b82f6; background: #334155; }
        .tab-content { display: none; height: 100%; }
        .tab-content.active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .detalle-fila { display: none; background-color: #1e293b; }
        .detalle-fila.active { display: table-row; }
        .btn-detalle { transition: transform 0.2s; display: inline-block; }
        .btn-detalle.open { transform: rotate(180deg); }

        .estado-baja { background-color: #3b1111 !important; border-left: 4px solid #ef4444; }
        input, select { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; }
        
        .scroll-tabla {
            overflow-y: auto;
            max-height: calc(100vh - 250px);
            scrollbar-width: thin;
            scrollbar-color: #334155 #0f172a;
        }
        .scroll-tabla::-webkit-scrollbar { width: 6px; }
        .scroll-tabla::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .text-empresa { color: #94a3b8; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        
        .search-results { position: absolute; width: 100%; background: #1e293b; border: 1px solid #334155; z-index: 50; max-height: 150px; overflow-y: auto; border-radius: 0 0 8px 8px; }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #334155; font-size: 13px; }
        .search-item:hover { background: #334155; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl max-w-sm w-full space-y-6 text-center border border-slate-800">
            <h2 class="text-2xl font-bold text-white uppercase italic">Belzunces</h2>
            <input type="password" id="passInput" placeholder="Contraseña" class="w-full p-4 rounded-xl text-center font-bold">
            <button onclick="validarAcceso()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase shadow-lg hover:bg-blue-500">Entrar</button>
        </div>
    </div>

    <header class="bg-slate-950 p-6 flex justify-between items-center border-b border-slate-800 shrink-0">
        <h1 class="text-2xl font-bold uppercase italic text-blue-500">Transportes Belzunces</h1>
        <button onclick="cerrarSesion()" class="text-xs bg-slate-900 px-4 py-2 rounded-lg text-slate-400">Salir</button>
    </header>

    <div id="app-content" style="display: none;" class="flex-1 overflow-hidden">
        <main class="max-w-7xl mx-auto p-8 grid grid-cols-1 md:grid-cols-4 gap-8 h-full">
            
            <aside class="space-y-2 shrink-0">
                <button onclick="showTab('inicio', this)" class="w-full text-left p-4 rounded-lg sidebar-card active-tab font-semibold">📊 Totales</button>
                <button onclick="showTab('vaca-tab', this)" class="w-full text-left p-4 rounded-lg sidebar-card font-semibold text-blue-400">📅 Añadir Vacaciones</button>
                <button id="tab-form-btn" onclick="showTab('gestion-tab', this)" class="w-full text-left p-4 rounded-lg sidebar-card font-semibold">👤 Gestión / Alta</button>
            </aside>

            <section class="md:col-span-3 h-full overflow-hidden">
                
                <div id="inicio" class="tab-content active bg-slate-900 p-6 rounded-2xl border border-slate-800">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6 shrink-0">
                        <h2 class="text-xl font-bold">Resumen de Personal</h2>
                        <div class="flex gap-2 w-full md:w-auto">
                            <select id="filtroEmpresa" onchange="filtrarNombres()" class="p-2 rounded-lg text-sm bg-slate-800 border border-slate-700 text-white font-semibold">
                                <option value="">🏢 Todas las Empresas</option>
                                <option value="ANTONIO">Antonio Belzunces</option>
                                <option value="JUAN">Juan Belzunces</option>
                                <option value="COMERCIAL">Comercial Belzunces</option>
                            </select>
                            <div class="relative w-full md:w-64">
                                <input type="text" id="buscador" onkeyup="filtrarNombres()" placeholder="🔍 Buscar nombre..." class="w-full p-2 pl-4 rounded-lg text-sm">
                            </div>
                        </div>
                        <button onclick="cargarDatosExcel()" class="bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-500">🔄 Sincronizar</button>
                    </div>

                    <div class="scroll-tabla border border-slate-800 rounded-lg">
                        <table class="w-full text-left text-sm">
                            <thead class="sticky top-0 bg-slate-900 z-10 shadow-sm">
                                <tr class="border-b border-slate-800 text-slate-500 uppercase text-[10px] font-extrabold tracking-widest">
                                    <th class="py-4 px-4">Empleado</th>
                                    <th class="py-4 px-2">Empresa</th>
                                    <th class="py-4 px-2 text-blue-400">F. Real</th>
                                    <th class="py-4 px-2 text-red-400">Estado</th>
                                    <th class="py-4 px-2 text-center">Gast.</th>
                                    <th class="py-4 px-2 text-center">Saldo</th>
                                    <th class="py-4 px-2 text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-datos"></tbody>
                        </table>
                    </div>
                </div>

                <div id="vaca-tab" class="tab-content bg-slate-900 p-8 rounded-2xl border border-slate-800 overflow-y-auto">
                    <div class="max-w-md mx-auto space-y-6">
                        <h2 class="text-2xl font-black text-blue-400 uppercase italic">Registrar Vacaciones</h2>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] text-slate-500 uppercase font-bold">1. Filtrar por Empresa</label>
                                <select id="vaca-filtro-empresa" class="w-full p-3 rounded-lg text-sm font-bold mt-1">
                                    <option value="">Todas las empresas</option>
                                    <option value="ANTONIO">Antonio Belzunces</option>
                                    <option value="JUAN">Juan Belzunces</option>
                                    <option value="COMERCIAL">Comercial Belzunces</option>
                                </select>
                            </div>

                            <div class="relative">
                                <label class="text-[10px] text-slate-500 uppercase font-bold">2. Buscar Empleado</label>
                                <input type="text" id="vaca-search" onkeyup="buscarParaVaca(this.value)" placeholder="Escribe el nombre..." class="w-full p-4 rounded-xl text-lg font-bold mt-1">
                                <div id="vaca-results" class="search-results hidden"></div>
                            </div>
                        </div>

                        <div id="vaca-info-empleado" class="hidden bg-slate-800/50 p-4 rounded-xl border border-blue-500/30">
                            <p id="vaca-nombre-sel" class="font-bold text-white text-lg">-</p>
                            <p id="vaca-empresa-sel" class="text-xs text-slate-400 uppercase">-</p>
                            <div class="mt-2 flex items-center gap-2">
                                <span class="text-xs font-bold text-slate-500">SALDO ACTUAL:</span>
                                <span id="vaca-saldo-sel" class="bg-blue-600 px-2 py-0.5 rounded text-xs font-black text-white">0</span>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] text-slate-500 uppercase font-bold italic">Fecha Inicio</label><input type="date" id="vaca-ini" onchange="calcDiasVaca()" class="w-full p-3 rounded-lg text-sm"></div>
                            <div><label class="text-[10px] text-slate-500 uppercase font-bold italic">Fecha Fin</label><input type="date" id="vaca-fin" onchange="calcDiasVaca()" class="w-full p-3 rounded-lg text-sm"></div>
                        </div>

                        <div class="bg-slate-800 p-4 rounded-xl flex justify-between items-center border border-slate-700">
                            <span class="text-slate-400 font-bold uppercase text-xs">Días a descontar:</span>
                            <span id="vaca-contador" class="text-blue-400 text-2xl font-black">0</span>
                        </div>

                        <button onclick="guardarVacacionesSolo()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase hover:bg-blue-500 shadow-xl">Confirmar Vacaciones</button>
                    </div>
                </div>

                <div id="gestion-tab" class="tab-content bg-slate-900 p-8 rounded-2xl border border-slate-800 overflow-y-auto">
                    <div class="max-w-md mx-auto space-y-4">
                        <div class="flex justify-between items-center">
                            <h2 id="titulo-form" class="text-xl font-bold text-blue-400 uppercase">Ficha de Empleado</h2>
                            <button onclick="limpiarFormulario()" class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400 hover:text-white">NUEVO ALTA</button>
                        </div>
                        
                        <label class="text-[10px] text-slate-500 uppercase font-bold">Empresa</label>
                        <select id="empresa" class="w-full p-3 rounded-lg text-sm font-bold">
                            <option>Transportes Antonio Belzunces S.L</option>
                            <option>Transportes Juan Belzunces S.L</option>
                            <option>Comercial Belzunces Rojas S.A</option>
                        </select>
                        
                        <label class="text-[10px] text-slate-500 uppercase font-bold">Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="NOMBRE APELLIDO" class="w-full p-3 rounded-lg text-sm font-bold uppercase">
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] text-slate-500 uppercase font-bold">F. Alta Cálculo</label><input type="date" id="fechaAltaCalc" class="w-full p-3 rounded-lg text-sm"></div>
                            <div><label class="text-[10px] text-blue-400 uppercase font-bold">F. Alta Real</label><input type="date" id="fechaAltaReal" class="w-full p-3 rounded-lg text-sm"></div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] text-slate-500 uppercase font-bold">Clave Contrato</label><input type="text" id="claveContrato" placeholder="300, 100..." class="w-full p-3 rounded-lg text-sm"></div>
                            <div><label class="text-[10px] text-red-400 uppercase font-bold">F. Baja (opcional)</label><input type="date" id="fechaBaja" class="w-full p-3 rounded-lg text-sm"></div>
                        </div>
                        
                        <div class="pt-4">
                            <button id="btn-guardar" onclick="enviarYGuardar()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase hover:bg-blue-500 shadow-xl transition-all active:scale-95">Guardar Ficha</button>
                        </div>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydLWtx3oVQUUYSrdVl_PFcgV7d9ycyM1aBP3rTIRQaFZ1TWc1FAFawBjgeQqsScJviGg/exec";
        const SHEET_ID = "1u8I2q-Hz6COb6m0e9eeR5S_lOiGAIErHXEV_v3YxtGA";
        let datosGlobales = {};
        let empleadoVacaSeleccionado = null;
        let editando = false;

        function validarAcceso() {
            if (document.getElementById('passInput').value === "belzunces2026") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                cargarDatosExcel();
            }
        }
        function cerrarSesion() { location.reload(); }
        
        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar-card').forEach(c => c.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            if(btn) btn.classList.add('active-tab');
        }

        // --- BÚSQUEDA PARA VACACIONES CON FILTRO EMPRESA ---
        function buscarParaVaca(val) {
            const resDiv = document.getElementById('vaca-results');
            const filtroEmpresa = document.getElementById('vaca-filtro-empresa').value.toUpperCase();
            if (val.length < 1) { resDiv.classList.add('hidden'); return; }
            
            const matches = Object.values(datosGlobales).filter(t => {
                const coincideNombre = t.nombre.includes(val.toUpperCase());
                const coincideEmpresa = filtroEmpresa === "" || t.empresaFull.toUpperCase().includes(filtroEmpresa);
                return coincideNombre && coincideEmpresa;
            }).slice(0, 10);

            if (matches.length > 0) {
                resDiv.innerHTML = matches.map(m => `
                    <div class="search-item" onclick="seleccionarParaVaca('${m.nombre.replace(/'/g, "\\'")}')">
                        ${m.nombre} <br>
                        <span class="text-[9px] text-blue-400 font-bold uppercase">${m.empresaFull.replace("Transportes ", "")}</span>
                    </div>
                `).join('');
                resDiv.classList.remove('hidden');
            } else {
                resDiv.classList.add('hidden');
            }
        }

        function seleccionarParaVaca(nombre) {
            const t = datosGlobales[nombre];
            empleadoVacaSeleccionado = t;
            document.getElementById('vaca-search').value = t.nombre;
            document.getElementById('vaca-results').classList.add('hidden');
            
            document.getElementById('vaca-nombre-sel').innerText = t.nombre;
            document.getElementById('vaca-empresa-sel').innerText = t.empresaFull;
            document.getElementById('vaca-saldo-sel').innerText = t.saldo;
            document.getElementById('vaca-info-empleado').classList.remove('hidden');
        }

        function calcDiasVaca() {
            const f1 = document.getElementById('vaca-ini').value;
            const f2 = document.getElementById('vaca-fin').value;
            if (f1 && f2) {
                const diff = (new Date(f2) - new Date(f1)) / 86400000 + 1;
                document.getElementById('vaca-contador').innerText = diff > 0 ? Math.round(diff) : 0;
            }
        }

        async function guardarVacacionesSolo() {
            if (!empleadoVacaSeleccionado) return alert("Primero selecciona un empleado");
            const dias = parseInt(document.getElementById('vaca-contador').innerText);
            if (dias <= 0) return alert("Selecciona fechas válidas");

            const d = {
                nombre: empleadoVacaSeleccionado.nombre,
                empresa: empleadoVacaSeleccionado.empresaFull,
                inicio: document.getElementById('vaca-ini').value,
                fin: document.getElementById('vaca-fin').value,
                dias: dias,
                fechaAlta: empleadoVacaSeleccionado.fAltaCalcRaw,
                fechaAltaReal: empleadoVacaSeleccionado.fAltaRealRaw,
                clave: empleadoVacaSeleccionado.clave,
                baja: empleadoVacaSeleccionado.bajaRaw,
                accion: "NUEVO"
            };

            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
            alert("Vacaciones registradas.");
            location.reload();
        }

        // --- GESTIÓN DE FICHA ---
        function editarTrabajador(nombre) {
            const t = datosGlobales[nombre];
            if (!t) return;
            editando = true;
            document.getElementById('titulo-form').innerText = "Editando Ficha: " + nombre;
            document.getElementById('btn-guardar').innerText = "Actualizar Ficha";
            document.getElementById('btn-guardar').classList.replace('bg-blue-600', 'bg-amber-600');
            document.getElementById('empresa').value = t.empresaFull;
            document.getElementById('nombre').value = t.nombre;
            document.getElementById('nombre').readOnly = true; 
            document.getElementById('fechaAltaCalc').value = t.fAltaCalcRaw;
            document.getElementById('fechaAltaReal').value = t.fAltaRealRaw;
            document.getElementById('claveContrato').value = t.clave;
            document.getElementById('fechaBaja').value = t.bajaRaw === "ACTIVO" ? "" : t.bajaRaw;
            showTab('gestion-tab', document.getElementById('tab-form-btn'));
        }

        function limpiarFormulario() {
            editando = false;
            document.getElementById('titulo-form').innerText = "Ficha de Empleado";
            document.getElementById('btn-guardar').innerText = "Guardar Ficha";
            document.getElementById('btn-guardar').classList.replace('bg-amber-600', 'bg-blue-600');
            document.getElementById('nombre').readOnly = false;
            document.getElementById('nombre').value = "";
            document.getElementById('fechaAltaCalc').value = "";
            document.getElementById('fechaAltaReal').value = "";
            document.getElementById('claveContrato').value = "";
            document.getElementById('fechaBaja').value = "";
        }

        function formatFechaParaInput(fechaStr) {
            if (!fechaStr || ["-", "ACTIVO"].includes(fechaStr.toUpperCase())) return "";
            if (fechaStr.includes('/')) {
                const parts = fechaStr.split('/');
                return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
            }
            return fechaStr;
        }

        function parseFechaExcel(fechaStr) {
            if (!fechaStr || ["-", "ACTIVO", ""].includes(fechaStr.trim())) return null;
            if (fechaStr.includes('/')) {
                const parts = fechaStr.split('/');
                return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
            }
            const d = new Date(fechaStr);
            return isNaN(d.getTime()) ? null : d;
        }

        function filtrarNombres() {
            const inputNombre = document.getElementById("buscador").value.toUpperCase().trim();
            const filtroEmpresa = document.getElementById("filtroEmpresa").value.toUpperCase();
            const filas = document.querySelectorAll("#tabla-datos tr:not(.detalle-fila)");

            filas.forEach(fila => {
                const nombreFila = fila.cells[0].innerText.toUpperCase();
                const empresaFila = fila.cells[1].innerText.toUpperCase();
                const coincideNombre = nombreFila.includes(inputNombre);
                const coincideEmpresa = filtroEmpresa === "" || empresaFila.includes(filtroEmpresa);
                fila.style.display = (coincideNombre && coincideEmpresa) ? "" : "none";
            });
        }

        function toggleDetalle(id, icon) {
            document.getElementById(id).classList.toggle('active');
            document.getElementById(icon).classList.toggle('open');
        }

        // --- FUNCIÓN GENERAR WORD ---
        async function generarWord(nombre, empresa, fIni, fFin, dias) {
            const { Document, Packer, Paragraph, TextRun, AlignmentType } = docx;

            const doc = new Document({
                sections: [{
                    properties: {},
                    children: [
                        new Paragraph({
                            alignment: AlignmentType.CENTER,
                            children: [
                                new TextRun({ text: empresa.toUpperCase(), bold: true, size: 28 }),
                            ],
                        }),
                        new Paragraph({ text: "", spacing: { before: 400 } }),
                        new Paragraph({
                            alignment: AlignmentType.CENTER,
                            children: [
                                new TextRun({ text: "COMUNICACIÓN DE VACACIONES", bold: true, underline: {}, size: 24 }),
                            ],
                        }),
                        new Paragraph({ text: "", spacing: { before: 800 } }),
                        new Paragraph({
                            children: [
                                new TextRun({ text: `Por la presente, se comunica que el trabajador `, size: 24 }),
                                new TextRun({ text: nombre.toUpperCase(), bold: true, size: 24 }),
                                new TextRun({ text: ` disfrutará de su periodo vacacional desde el día `, size: 24 }),
                                new TextRun({ text: fIni, bold: true, size: 24 }),
                                new TextRun({ text: ` hasta el día `, size: 24 }),
                                new TextRun({ text: fFin, bold: true, size: 24 }),
                                new TextRun({ text: ` (ambos inclusive), lo que supone un total de `, size: 24 }),
                                new TextRun({ text: `${dias} días naturales.`, bold: true, size: 24 }),
                            ],
                        }),
                        new Paragraph({ text: "", spacing: { before: 2000 } }),
                        new Paragraph({
                            children: [
                                new TextRun({ text: "Firma de la Empresa:                                    Firma del Trabajador:", size: 24 }),
                            ],
                        }),
                    ],
                }],
            });

            Packer.toBlob(doc).then(blob => {
                saveAs(blob, `Vacaciones_${nombre}_${fIni}.docx`);
            });
        }

        async function enviarYGuardar() {
            const nombreLimpio = document.getElementById('nombre').value.trim().toUpperCase();
            if (!nombreLimpio || !document.getElementById('fechaAltaCalc').value) return alert("Faltan datos obligatorios.");

            const d = {
                empresa: document.getElementById('empresa').value,
                puesto: "CONDUCTOR",
                nombre: nombreLimpio,
                inicio: "", fin: "", dias: 0,
                fechaAlta: document.getElementById('fechaAltaCalc').value,
                fechaAltaReal: document.getElementById('fechaAltaReal').value,
                clave: document.getElementById('claveContrato').value,
                baja: document.getElementById('fechaBaja').value || "ACTIVO",
                accion: editando ? "EDITAR" : "NUEVO"
            };

            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
            alert("Ficha guardada.");
            setTimeout(() => location.reload(), 1500);
        }

        async function cargarDatosExcel() {
            const tbody = document.getElementById('tabla-datos');
            tbody.innerHTML = "<tr><td colspan='7' class='py-8 text-center italic text-slate-500'>Cargando datos...</td></tr>";
            
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0&t=${Date.now()}`;
                const res = await fetch(url);
                const csvText = await res.text();
                const filas = csvText.split('\n').map(row => row.split(','));
                datosGlobales = {};

                for (let i = 1; i < filas.length; i++) {
                    const r = filas[i];
                    if (!r[3]) continue;
                    const limpiar = (t) => t ? t.replace(/"/g, '').trim() : '';
                    const nombre = limpiar(r[3]);
                    if (!datosGlobales[nombre]) {
                        datosGlobales[nombre] = { 
                            nombre, 
                            empresaFull: limpiar(r[1]),
                            fAltaCalcRaw: formatFechaParaInput(limpiar(r[7])),
                            fAltaRealRaw: formatFechaParaInput(limpiar(r[9])),
                            fAltaRealDisplay: limpiar(r[9]),
                            clave: limpiar(r[10]), 
                            bajaRaw: limpiar(r[11]) || "ACTIVO", 
                            periodos: [] 
                        };
                    }
                    if (limpiar(r[4]) && limpiar(r[5]) && limpiar(r[6]) != "0") {
                        datosGlobales[nombre].periodos.push({ ini: limpiar(r[4]), fin: limpiar(r[5]), dias: Math.abs(parseInt(r[6])) || 0 });
                    }
                }

                tbody.innerHTML = "";
                Object.values(datosGlobales).sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach((t, index) => {
                    const esBaja = t.bajaRaw !== "ACTIVO" && t.bajaRaw !== "" && t.bajaRaw !== "-";
                    const fAlta = parseFechaExcel(t.fAltaCalcRaw);
                    const fFinCalc = esBaja ? (parseFechaExcel(t.bajaRaw) || new Date()) : new Date();
                    let generadas = fAlta ? parseFloat(((fFinCalc - fAlta) / 86400000 * (30/365)).toFixed(1)) : 0;
                    const disfrutados = t.periodos.reduce((acc, p) => acc + p.dias, 0);
                    const saldo = (generadas - disfrutados).toFixed(1);
                    t.saldo = saldo;

                    const tr = document.createElement('tr');
                    tr.className = `border-b border-slate-800 hover:bg-slate-800/50 cursor-pointer ${esBaja ? 'estado-baja' : ''}`;
                    tr.innerHTML = `
                        <td class="py-4 px-4 font-bold text-xs uppercase text-white" onclick="toggleDetalle('det-${index}', 'ic-${index}')">
                            <span id="ic-${index}" class="btn-detalle mr-1 text-blue-500 text-[10px]">▼</span> ${t.nombre}
                        </td>
                        <td class="py-4 px-2 text-empresa">${t.empresaFull.replace("Transportes ", "").replace(" S.L", "")}</td>
                        <td class="py-4 px-2 text-[10px] font-mono text-blue-400 font-bold">${t.fAltaRealDisplay}</td>
                        <td class="py-4 px-2 text-[10px] font-mono text-red-400 font-bold">${esBaja ? t.bajaRaw : 'ACTIVO'}</td>
                        <td class="py-4 px-2 text-center text-red-400 font-bold">${disfrutados}</td>
                        <td class="py-4 px-2 text-center"><span class="px-2 py-1 rounded text-xs font-black ${saldo > 0 ? 'bg-green-600' : 'bg-red-600'} text-white">${saldo}</span></td>
                        <td class="py-4 px-2 text-center space-x-2">
                            <button onclick="editarTrabajador('${t.nombre.replace(/'/g, "\\'")}')" title="Editar Ficha" class="text-blue-400 hover:text-blue-200 text-lg">✏️</button>
                        </td>
                    `;
                    
                    const trDetalle = document.createElement('tr');
                    trDetalle.id = `det-${index}`;
                    trDetalle.className = "detalle-fila";
                    trDetalle.innerHTML = `
                        <td colspan="7" class="p-4 bg-slate-800/40">
                            <div class="space-y-2">
                                ${t.periodos.map(p => `
                                    <div class="flex justify-between items-center bg-slate-900 p-2 rounded border border-slate-700">
                                        <span class="text-[11px]">📅 <b>${p.ini}</b> al <b>${p.fin}</b> (${p.dias} días)</span>
                                        <button onclick="generarWord('${t.nombre}', '${t.empresaFull}', '${p.ini}', '${p.fin}', '${p.dias}')" 
                                                class="bg-blue-600/20 text-blue-400 border border-blue-500/50 px-2 py-1 rounded text-[10px] font-bold hover:bg-blue-600 hover:text-white transition-all">
                                            📄 GENERAR WORD
                                        </button>
                                    </div>
                                `).join('') || '<span class="text-xs italic text-slate-500 px-2">No hay periodos de vacaciones registrados.</span>'}
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr); tbody.appendChild(trDetalle);
                });
            } catch (e) { tbody.innerHTML = "<tr><td>Error de carga.</td></tr>"; }
        }
    </script>
</body>
</html>
