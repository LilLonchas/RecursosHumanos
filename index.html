<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RRHH | Transportes Belzunces</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .sidebar-card { transition: all 0.3s ease; border-left: 4px solid transparent; cursor: pointer; background: #1e293b; }
        .sidebar-card.active-tab { border-left: 4px solid #3b82f6; background: #334155; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .detalle-fila { display: none; background-color: #1e293b; }
        .detalle-fila.active { display: table-row; }
        .btn-detalle { transition: transform 0.2s; display: inline-block; }
        .btn-detalle.open { transform: rotate(180deg); }

        input, select { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; }
        ::placeholder { color: #64748b !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl max-w-sm w-full space-y-6 text-center border border-slate-800">
            <h2 class="text-2xl font-bold text-white uppercase italic">Belzunces</h2>
            <input type="password" id="passInput" placeholder="Contraseña" class="w-full p-4 rounded-xl text-center font-bold">
            <button onclick="validarAcceso()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase shadow-lg hover:bg-blue-500">Entrar</button>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        <header class="bg-slate-950 p-6 flex justify-between items-center border-b border-slate-800">
            <h1 class="text-2xl font-bold uppercase italic text-blue-500">Transportes Belzunces</h1>
            <button onclick="cerrarSesion()" class="text-xs bg-slate-900 px-4 py-2 rounded-lg text-slate-400">Salir</button>
        </header>

        <main class="max-w-7xl mx-auto p-8 grid grid-cols-1 md:grid-cols-4 gap-8">
            <aside class="space-y-2">
                <button onclick="showTab('inicio', this)" class="w-full text-left p-4 rounded-lg sidebar-card active-tab font-semibold">📊 Totales</button>
                <button id="btn-pestaña-form" onclick="showTab('vacaciones', this)" class="w-full text-left p-4 rounded-lg sidebar-card font-semibold">📅 Alta / Solicitud</button>
            </aside>

            <section class="md:col-span-3">
                <div id="inicio" class="tab-content active bg-slate-900 p-6 rounded-2xl border border-slate-800">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                        <h2 class="text-xl font-bold">Resumen General</h2>
                        <div class="relative w-full md:w-64">
                            <input type="text" id="buscador" onkeyup="filtrarNombres()" placeholder="🔍 Buscar empleado..." class="w-full p-2 pl-10 rounded-lg text-sm border border-slate-700">
                        </div>
                        <button onclick="cargarDatosExcel()" class="bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-500 shrink-0">🔄 Actualizar</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm" id="tabla-empleados">
                            <thead>
                                <tr class="border-b border-slate-800 text-slate-500 uppercase text-[10px] font-extrabold tracking-widest">
                                    <th class="py-4 px-4">Empleado</th>
                                    <th class="py-4 px-2">F. Alta</th>
                                    <th class="py-4 px-2 text-center">Generadas</th>
                                    <th class="py-4 px-2 text-center">Gastadas</th>
                                    <th class="py-4 px-2 text-center">Saldo</th>
                                    <th class="py-4 px-2 text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-datos"></tbody>
                        </table>
                    </div>
                </div>

                <div id="vacaciones" class="tab-content bg-slate-900 p-8 rounded-2xl border border-slate-800">
                    <div class="max-w-md mx-auto space-y-4">
                        <h2 id="titulo-form" class="text-xl font-bold text-center text-blue-400 uppercase">Gestión de Empleado</h2>
                        <select id="empresa" class="w-full p-3 rounded-lg text-sm">
                            <option>Transportes Antonio Belzunces S.L</option>
                            <option>Transportes Juan Belzunces S.L</option>
                            <option>Comercial Belzunces Rojas S.A</option>
                        </select>
                        <input type="text" id="nombre" placeholder="Nombre completo" class="w-full p-3 rounded-lg text-sm">
                        
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-1">FECHA DE ALTA</label>
                            <input type="date" id="nuevaFechaAlta" class="w-full p-3 rounded-lg text-sm">
                        </div>

                        <hr class="border-slate-800 my-4">
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 ml-1">INICIO VACACIONES</label>
                                <input type="date" id="fechaIni" onchange="calcularDias()" class="w-full p-3 rounded-lg text-sm">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 ml-1">FIN VACACIONES</label>
                                <input type="date" id="fechaFin" onchange="calcularDias()" class="w-full p-3 rounded-lg text-sm">
                            </div>
                        </div>
                        
                        <div class="bg-slate-800 p-4 rounded-xl flex justify-between items-center font-bold">
                            <span class="text-slate-400">Días:</span>
                            <span id="contadorDias" class="text-blue-400 text-xl">0</span>
                        </div>
                        
                        <button onclick="enviarYDescargar()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase hover:bg-blue-500">Guardar</button>
                        <button onclick="limpiarFormulario()" class="w-full text-[10px] text-slate-500 uppercase">Limpiar</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweLUIVcu8XJ5EqD_rcBE3UOVu46WBLoiHosy7-ZQ3pfMcuVmlgyXpioFuIQOX3wgs_CQ/exec";
        const SHEET_ID = "1u8I2q-Hz6COb6m0e9eeR5S_lOiGAIErHXEV_v3YxtGA";

        function validarAcceso() {
            if (document.getElementById('passInput').value === "belzunces2026") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                cargarDatosExcel();
            }
        }
        function cerrarSesion() { location.reload(); }
        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar-card').forEach(c => c.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            if(btn) btn.classList.add('active-tab');
        }

        // Lógica del BUSCADOR
        function filtrarNombres() {
            const input = document.getElementById("buscador").value.toUpperCase();
            const filas = document.getElementById("tabla-datos").getElementsByTagName("tr");
            
            for (let i = 0; i < filas.length; i++) {
                // Solo filtramos las filas principales (las que no son detalle)
                if (!filas[i].classList.contains('detalle-fila')) {
                    const nombre = filas[i].getElementsByTagName("td")[0];
                    if (nombre) {
                        const texto = nombre.textContent || nombre.innerText;
                        if (texto.toUpperCase().indexOf(input) > -1) {
                            filas[i].style.display = "";
                        } else {
                            filas[i].style.display = "none";
                            // También ocultamos su detalle si existe una fila siguiente de detalle
                            if (filas[i+1] && filas[i+1].classList.contains('detalle-fila')) {
                                filas[i+1].classList.remove('active');
                                filas[i+1].style.display = "none";
                            }
                        }
                    }
                }
            }
        }

        function calcularDias() {
            const f1 = document.getElementById('fechaIni').value;
            const f2 = document.getElementById('fechaFin').value;
            if (f1 && f2) {
                const diff = (new Date(f2) - new Date(f1)) / (1000 * 60 * 60 * 24) + 1;
                document.getElementById('contadorDias').innerText = diff > 0 ? Math.round(diff) : 0;
            }
        }

        function editarInfo(nombre, alta, empresa, ini = "", fin = "") {
            document.getElementById('nombre').value = nombre;
            document.getElementById('nuevaFechaAlta').value = alta;
            document.getElementById('empresa').value = empresa;
            document.getElementById('fechaIni').value = ini;
            document.getElementById('fechaFin').value = fin;
            calcularDias();
            showTab('vacaciones', document.getElementById('btn-pestaña-form'));
        }

        async function cargarDatosExcel() {
            const tbody = document.getElementById('tabla-datos');
            tbody.innerHTML = "<tr><td colspan='6' class='py-8 text-center italic text-slate-500'>Sincronizando...</td></tr>";
            
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0&t=${Date.now()}`;
                const res = await fetch(url);
                const csvText = await res.text();
                const filas = csvText.split('\n').map(row => row.split(','));
                const trabajadores = {};

                for (let i = 1; i < filas.length; i++) {
                    const r = filas[i];
                    if (r.length < 4 || !r[3]) continue;
                    const limpiar = (t) => t ? t.replace(/"/g, '').trim() : '';
                    
                    const empresa = limpiar(r[1]);
                    const nombre = limpiar(r[3]);
                    const fIni = limpiar(r[4]);
                    const fFin = limpiar(r[5]);
                    const diasFila = parseInt(limpiar(r[6])) || 0;
                    const fechaAltaExcel = limpiar(r[7]); 

                    if (!trabajadores[nombre]) {
                        trabajadores[nombre] = { nombre, empresa, fAlta: fechaAltaExcel || "2025-01-01", periodos: [] };
                    }
                    
                    if (fIni && fFin) {
                        if (diasFila === 0) {
                            const index = trabajadores[nombre].periodos.findIndex(p => p.ini === fIni && p.fin === fFin && p.activo !== false);
                            if (index !== -1) trabajadores[nombre].periodos[index].activo = false;
                        } else {
                            trabajadores[nombre].periodos.push({ ini: fIni, fin: fFin, dias: diasFila, activo: true });
                        }
                    }
                    if (fechaAltaExcel) trabajadores[nombre].fAlta = fechaAltaExcel;
                }

                tbody.innerHTML = "";
                Object.values(trabajadores).forEach((t, index) => {
                    const hoy = new Date();
                    const alta = new Date(t.fAlta);
                    const diffDias = Math.floor((hoy - alta) / (1000 * 60 * 60 * 24));
                    const generadas = Math.max(0, (diffDias * (30 / 365)).toFixed(1));
                    const disfrutados = t.periodos.reduce((acc, p) => p.activo ? acc + p.dias : acc, 0);
                    const saldo = (generadas - disfrutados).toFixed(1);
                    const idDetalle = `detalle-${index}`;

                    tbody.innerHTML += `
                        <tr class="border-b border-slate-800 hover:bg-slate-800/50 transition cursor-pointer">
                            <td class="py-4 px-4 font-bold text-white" onclick="toggleDetalle('${idDetalle}', 'icon-${index}')">
                                <span id="icon-${index}" class="btn-detalle mr-2 text-blue-500 text-[10px]">▼</span> ${t.nombre}
                            </td>
                            <td class="py-4 px-2 text-xs text-slate-400 font-mono">${t.fAlta}</td>
                            <td class="py-4 px-2 text-center font-semibold text-slate-300">${generadas}</td>
                            <td class="py-4 px-2 text-center font-semibold text-red-400">${disfrutados}</td>
                            <td class="py-4 px-2 text-center">
                                <span class="inline-block ${saldo > 0 ? 'bg-green-600' : 'bg-red-600'} text-white font-black px-3 py-1 rounded-full text-xs">
                                    ${saldo}
                                </span>
                            </td>
                            <td class="py-4 px-2 text-center">
                                <button onclick="editarInfo('${t.nombre}', '${t.fAlta}', '${t.empresa}')" class="text-blue-400 hover:text-white">✏️</button>
                            </td>
                        </tr>
                        <tr id="${idDetalle}" class="detalle-fila">
                            <td colspan="6" class="p-6 border-l-4 border-blue-500 bg-slate-800/30">
                                <ul class="text-xs space-y-1 text-slate-400">
                                    ${t.periodos.filter(p => p.activo).map(p => `
                                        <li class="flex justify-between items-center bg-slate-900 p-2 rounded border border-slate-700 mb-1">
                                            <span>Del ${p.ini} al ${p.fin} (${p.dias} días)</span>
                                            <div class="space-x-2">
                                                <button onclick="editarInfo('${t.nombre}', '${t.fAlta}', '${t.empresa}', '${p.ini}', '${p.fin}')" class="text-blue-400 text-[10px] uppercase font-bold">Editar</button>
                                                <button onclick="eliminarFila('${t.nombre}', '${t.fAlta}', '${t.empresa}', '${p.ini}', '${p.fin}')" class="text-red-500 text-[10px] uppercase font-bold">Eliminar</button>
                                            </div>
                                        </li>
                                    `).join('') || '<li>Sin registros activos</li>'}
                                </ul>
                            </td>
                        </tr>`;
                });
            } catch (e) { console.error(e); }
        }

        function toggleDetalle(filaId, iconId) {
            const fila = document.getElementById(filaId);
            const icono = document.getElementById(iconId);
            fila.classList.toggle('active');
            icono.classList.toggle('open');
            // Aseguramos que se vea si la fila principal es visible
            fila.style.display = fila.classList.contains('active') ? "table-row" : "none";
        }

        function eliminarFila(nombre, alta, empresa, ini, fin) {
            if(confirm("¿Seguro que quieres eliminar este periodo?")) {
                const d = { empresa, puesto: "CONDUCTOR", nombre, inicio: ini, fin: fin, dias: 0, fechaAlta: alta };
                fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
                alert("Eliminando...");
                setTimeout(cargarDatosExcel, 2000);
            }
        }

        async function enviarYDescargar() {
            const d = {
                empresa: document.getElementById('empresa').value,
                puesto: "CONDUCTOR",
                nombre: document.getElementById('nombre').value,
                inicio: document.getElementById('fechaIni').value || "",
                fin: document.getElementById('fechaFin').value || "",
                dias: document.getElementById('contadorDias').innerText,
                fechaAlta: document.getElementById('nuevaFechaAlta').value
            };
            if (!d.nombre || !d.fechaAlta) return alert("Nombre y Alta obligatorios.");
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
            alert("Enviado.");
            limpiarFormulario();
            setTimeout(cargarDatosExcel, 2000);
        }

        function limpiarFormulario() {
            document.getElementById('nombre').value = "";
            document.getElementById('nuevaFechaAlta').value = "";
            document.getElementById('fechaIni').value = "";
            document.getElementById('fechaFin').value = "";
            document.getElementById('contadorDias').innerText = "0";
        }
    </script>
</body>
</html>
